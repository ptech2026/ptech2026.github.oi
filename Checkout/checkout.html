<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | DrukBasket</title>
    <script src="/auth.js"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* UI Enhancements */
        .live-logo-container { display: inline-flex; align-items: center; gap: 4px; }
        .recording-circle { position: relative; width: 20px; height: 20px; animation: simplePulse 1.5s infinite; }
        .inner-dot { width: 12px; height: 12px; background: #ff0000; border-radius: 50%; position: absolute; top: 4px; left: 4px; }
        .outer-ring { width: 20px; height: 20px; border: 1px solid #ff0000; border-radius: 50%; }
        @keyframes simplePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .checkout-container { max-width: 1200px; margin: 30px auto; padding: 0 5%; display: flex; gap: 30px; }
        .checkout-form { flex: 1.2; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; position: relative; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }

        /* Recommendation Dropdown */
        #address-results { position: absolute; width: 100%; background: white; border: 1px solid #ddd; border-top: none; z-index: 1000; max-height: 200px; overflow-y: auto; display: none; border-radius: 0 0 8px 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.85rem; transition: background 0.2s; }
        .suggestion-item:hover { background: #f8f9fa; }

        .order-summary { flex: 1.8; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .summary-table th { text-align: left; color: #aaa; font-size: 0.75rem; text-transform: uppercase; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .summary-item-row td { padding: 15px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        .prod-img-small { width: 40px; height: 40px; border-radius: 4px; vertical-align: middle; margin-right: 10px; object-fit: cover; }
        
        .final-total-section { margin-top: 20px; padding-top: 15px; border-top: 2px solid #eee; text-align: right; }
        .place-order-btn { background: #ff6b6b; color: white; border: none; width: 100%; padding: 18px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; margin-top: 15px; }
        .place-order-btn:hover { background: #ee5253; transform: translateY(-2px); }
        .place-order-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <a href="/index.html"><img src="/Images/logo.png" alt="Drukbasket Logo" class="main-logo"></a>
        </div>
        <nav>
            <a href="/index.html">Marketplace</a>
            <a href="/aboutUs.html">About Us</a>
            <a href="/contactUs.html">Contact Us</a>
        </nav>
        <div class="user-actions">
            <a href="/market-prices.html" style="text-decoration: none;">
                <div class="live-logo-container">
                    <span class="market-price">View Current Market Prices</span>
                    <div class="recording-circle"><div class="inner-dot"></div><div class="outer-ring"></div></div>
                </div>
            </a>
            <a href="Dzongkha/index.html" style="text-decoration: none;">EN</a>
            <div class="cart-container">
                <span class="cart" style="font-size: 1.5rem;">🛒</span>
                <span id="cart-count" class="cart-badge">0</span>
            </div>
            <a href="/login.html"><button class="login-btn">LOG IN</button></a>
        </div>
    </header>

    <main class="checkout-container">
        <section class="checkout-form">
            <h3>Delivery Details</h3>
            <form id="finalOrderForm">
                <div class="form-group">
                    <label>Receiver Name</label>
                    <input type="text" id="custName" placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="custPhone" placeholder="17xxxxxx / 77xxxxxx" required>
                </div>
                
                <div class="form-group">
                    <label>Exact Delivery Address (Search Landmark/Area)</label>
                    <input type="text" id="custAddr" autocomplete="off" placeholder="Type to search in Bhutan..." oninput="searchAddress(this.value)" required>
                    <div id="address-results"></div>
                </div>

                <div class="form-group">
                    <label>Transportation Needed?</label>
                    <select id="transportOption" onchange="toggleDistanceInput()">
                        <option value="No">No, I will pick it up</option>
                        <option value="Yes">Yes, I need delivery transportation</option>
                    </select>
                </div>

                <div class="form-group" id="distanceGroup" style="display: none;">
                    <label>Calculated Distance (km)</label>
                    <input type="number" id="deliveryDistance" step="0.01" readonly style="background: #f9f9f9; cursor: not-allowed;">
                    <small style="color: #666;">Note: Nu. 100 for first 3km, Nu. 20/km thereafter.</small>
                </div>

                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="paymentMethod" required>
                        <option value="">Select Method</option>
                        <option value="mBOB / mPay">mBOB / mPay</option>
                        <option value="Cash on Delivery">Cash on Delivery</option>
                    </select>
                </div>
                <button type="submit" class="place-order-btn" id="submitBtn">CONFIRM & PLACE ORDER</button>
            </form>
        </section>

        <aside class="order-summary">
            <h3>Order Summary</h3>
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th style="text-align: right;">Total Items</th>
                    </tr>
                </thead>
                <tbody id="summary-table-body"></tbody>
            </table>
            
            <div class="final-total-section">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px; color: #666;">
                    <span>Subtotal:</span>
                    <span>Nu. <span id="subtotal-amount">0</span></span>
                </div>
                <div id="delivery-fee-row" style="display: none; justify-content: space-between; margin-bottom: 5px; color: #ff6b6b;">
                    <span>Delivery Charge:</span>
                    <span>Nu. <span id="delivery-charge">0</span></span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: #666;">
                    <span>Service Charge:</span>
                    <span>Nu. 75</span>
                </div>
                <hr>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                    <span style="font-weight: bold;">Amount to be Paid:</span>
                    <h2 id="final-payable" style="font-size: 2rem; color: #333; margin: 0;">Nu. 0</h2>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const shopLocation = { lat: 27.4712, lng: 89.6339 }; 
        let searchTimeout;

        function toggleDistanceInput() {
            const transportNeeded = document.getElementById('transportOption').value;
            const distanceGroup = document.getElementById('distanceGroup');
            distanceGroup.style.display = (transportNeeded === "Yes") ? "block" : "none";
            renderSummary();
        }

        async function searchAddress(query) {
            const resultsDiv = document.getElementById('address-results');
            clearTimeout(searchTimeout);
            if (query.length < 3) {
                resultsDiv.innerHTML = '';
                resultsDiv.style.display = 'none';
                return;
            }
            searchTimeout = setTimeout(async () => {
                const url = `https://nominatim.openstreetmap.org/search?format=json&countrycodes=bt&q=${encodeURIComponent(query)}`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    if (!data || data.length === 0) {
                        resultsDiv.style.display = 'none';
                        return;
                    }
                    resultsDiv.innerHTML = ''; 
                    resultsDiv.style.display = 'block';
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerText = item.display_name;
                        div.onclick = function() {
                            document.getElementById('custAddr').value = item.display_name;
                            resultsDiv.style.display = 'none';
                            calculateDistance({ lat: parseFloat(item.lat), lng: parseFloat(item.lon) });
                        };
                        resultsDiv.appendChild(div);
                    });
                } catch (error) { 
                    console.error("Search failed", error); 
                    resultsDiv.style.display = 'none';
                }
            }, 300); 
        }

        function calculateDistance(userLoc) {
            const R = 6371; 
            const dLat = (userLoc.lat - shopLocation.lat) * Math.PI / 180;
            const dLon = (userLoc.lng - shopLocation.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(shopLocation.lat * Math.PI / 180) * Math.cos(userLoc.lat * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distance = R * c;
            document.getElementById('deliveryDistance').value = distance.toFixed(2);
            document.getElementById('transportOption').value = "Yes";
            toggleDistanceInput();
        }

        function renderSummary() {
            const cart = JSON.parse(localStorage.getItem('drukCart')) || [];
            const selectedItems = cart.filter(item => item.selected === true);
            const tableBody = document.getElementById('summary-table-body');
            let subtotal = 0;
            tableBody.innerHTML = selectedItems.map(item => {
                const itemTotal = (parseFloat(item.price) || 0) * (parseInt(item.qty) || 1);
                subtotal += itemTotal;
                return `<tr class="summary-item-row">
                    <td><img src="${item.img || '/Images/placeholder.png'}" class="prod-img-small">${item.name}</td>
                    <td>${item.qty} ${item.unit || 'Units'}</td>
                    <td style="text-align: right; font-weight:bold;">Nu. ${itemTotal}</td>
                </tr>`;
            }).join('') || '<tr><td colspan="3">No items selected</td></tr>';

            const transportNeeded = document.getElementById('transportOption').value;
            const distance = parseFloat(document.getElementById('deliveryDistance').value) || 0;
            let deliveryFee = 0;
            if (transportNeeded === "Yes" && distance > 0) {
                document.getElementById('delivery-fee-row').style.display = "flex";
                deliveryFee = (distance <= 3) ? 100 : 100 + ((distance - 3) * 20);
            } else {
                document.getElementById('delivery-fee-row').style.display = "none";
            }
            const totalPayable = subtotal + 75 + deliveryFee;
            document.getElementById('subtotal-amount').innerText = subtotal.toLocaleString();
            document.getElementById('delivery-charge').innerText = deliveryFee.toFixed(2);
            document.getElementById('final-payable').innerText = `Nu. ${totalPayable.toFixed(2)}`;
        }

        // --- UPDATED SUBMIT LOGIC ---
        document.getElementById('finalOrderForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const paymentMethod = document.getElementById('paymentMethod').value;
            
            btn.innerText = "PROCESSING...";
            btn.disabled = true;
            
            setTimeout(() => {
                // If user picks mBOB / mPay, send them to the payment gateway
                if (paymentMethod === "mBOB / mPay") {
                    window.location.href = "/Checkout/payment.html";
                } else {
                    // Standard flow for Cash on Delivery
                    alert("Order recorded successfully! Please prepare cash for delivery.");
                    window.location.href = "/index.html";
                }
            }, 1200);
        };

        window.onload = renderSummary;
    </script>
</body>
</html>

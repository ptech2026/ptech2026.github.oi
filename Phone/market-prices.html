<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Prices | Drukbasket</title>
    <style>
        :root {
            --primary: #ff5e5e;
            --secondary: #e67e22;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* MOBILE HANDSET FRAME */
        .phone-container {
            width: 375px;
            height: 812px;
            background: var(--bg);
            border: 12px solid #000;
            border-radius: 45px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        /* TOP STATUS BAR */
        .status-bar {
            height: 40px;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            background: #fff;
        }

        /* APP HEADER */
        .app-header {
            background: #fff;
            padding: 10px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* LIVE PRICE INDICATOR */
        .live-tag {
            background: #fff0f0;
            color: #ff4d4d;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot { width: 6px; height: 6px; background: #ff4d4d; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } }

        /* CONTENT AREA */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 90px;
        }

        .page-title { margin: 10px 0; font-size: 1.4rem; color: #333; }
        .page-desc { font-size: 0.85rem; color: #777; margin-bottom: 20px; }

        /* STICKY SEARCH BAR */
        .search-container {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 5px 0 15px 0;
            z-index: 10;
        }
        #marketSearch {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* PRICE CARDS */
        .price-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f5f5f5;
            padding-bottom: 10px;
        }
        .item-name { font-weight: 700; color: #333; font-size: 1rem; }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .price-box {
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }
        .price-box.current { background: #fff8f0; border: 1px solid #ffe8cc; }
        .price-box.prev { background: #f8f9fa; border: 1px solid #eee; }

        .box-label { font-size: 9px; text-transform: uppercase; color: #999; letter-spacing: 0.5px; }
        .box-value { display: block; font-size: 0.95rem; font-weight: 800; color: var(--secondary); margin: 3px 0; }
        .box-date { font-size: 8px; color: #bbb; }

        /* OUT OF SEASON STATE */
        .out-of-season { opacity: 0.6; grayscale: 1; }
        .out-of-season .box-value { color: #999; font-size: 0.8rem; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: absolute;
            bottom: 0; width: 100%;
            height: 80px;
            background: #fff;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
        }
        .nav-item { text-align: center; color: #ccc; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { display: block; font-size: 10px; margin-top: 4px; font-weight: bold; }
        
        .cart-badge {
            background: var(--primary);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            position: absolute;
            top: -5px; right: -10px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 🔋</span>
    </div>

    <header class="app-header">
        <img src="/Images/logo.png" alt="Logo" style="height: 25px;">
        <div class="live-tag">
            <div class="dot"></div> LIVE PRICES
        </div>
    </header>

    <main class="main-scroll">
        <h1 class="page-title">Market Tracker</h1>
        <p class="page-desc">Current rates at Centenary Farmers Market (CFM), Thimphu.</p>

        <div class="search-container">
            <input type="text" id="marketSearch" placeholder="Search vegetables or fruits...">
        </div>

        <div id="priceListContainer">
            </div>
    </main>

    <nav class="bottom-nav">
        <a href="/Phone/home.html" class="nav-item">🏠<span>Home</span></a>
        <a href="/Phone/index.html" class="nav-item">🥬<span>Market</span></a>
        <a href="/Phone/preorder.html" class="nav-item" style="position:relative">
            🛒<span>Cart</span>
            <div id="cart-count" class="cart-badge" style="display:none">0</div>
        </a>
        <a href="/Phone/login.html" class="nav-item">👤<span>Account</span></a>
    </nav>
</div>

<script>
    const marketData = [
        { name: "Apple Golden Delicious", current: "300/KG", prev: "150/KG", season: true },
        { name: "Local Potato (Red)", current: "45/KG", prev: "40/KG", season: true },
        { name: "Organic Green Chilli", current: "120/KG", prev: "100/KG", season: true },
        { name: "Asparagus (Hybrid)", current: "120/BDL", prev: "OUT", season: true },
        { name: "Apricot", current: "OUT", prev: "OUT", season: false },
        { name: "Yak Cheese (Datshi)", current: "500/KG", prev: "480/KG", season: true },
        { name: "Dried Beef (Sukam)", current: "1300/KG", prev: "1250/KG", season: true },
        { name: "Eggs (Free Range)", current: "450/TRAY", prev: "420/TRAY", season: true }
    ];

    const container = document.getElementById('priceListContainer');
    const searchInput = document.getElementById('marketSearch');

    function renderCards(data) {
        container.innerHTML = '';
        data.forEach(item => {
            const isOutOfSeason = item.current === "OUT";
            const card = document.createElement('div');
            card.className = `price-card ${isOutOfSeason ? 'out-of-season' : ''}`;
            
            card.innerHTML = `
                <div class="card-header">
                    <span class="item-name">${item.name}</span>
                    <span style="font-size: 12px;">${isOutOfSeason ? '❄️' : '🌿'}</span>
                </div>
                <div class="comparison-grid">
                    <div class="price-box current">
                        <span class="box-label">This Week</span>
                        <span class="box-value">${isOutOfSeason ? 'OUT OF SEASON' : 'Nu. ' + item.current}</span>
                        <span class="box-date">Apr 26 - May 03</span>
                    </div>
                    <div class="price-box prev">
                        <span class="box-label">Previous</span>
                        <span class="box-value">${item.prev === 'OUT' ? 'N/A' : 'Nu. ' + item.prev}</span>
                        <span class="box-date">Last Record</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = marketData.filter(item => item.name.toLowerCase().includes(term));
        renderCards(filtered);
    });

    // Cart Badge Logic
    function updateBadge() {
        const cart = JSON.parse(localStorage.getItem('drukCart')) || [];
        const badge = document.getElementById('cart-count');
        if (cart.length > 0) {
            badge.innerText = cart.length;
            badge.style.display = 'block';
        }
    }

    renderCards(marketData);
    updateBadge();
</script>

</body>
</html>

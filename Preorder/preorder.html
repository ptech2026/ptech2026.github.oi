<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart (Pre Order) | DrukBasket</title>
    <script src="/auth.js"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        .preorder-container { max-width: 1200px; margin: 20px auto; padding: 0 5%; }
        .promo-banner {
            background-color: #e0fcf9;
            border: 1px solid #20c997;
            color: #087f5b;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 30px;
            position: relative;
        }
        .cart-layout { display: flex; gap: 30px; }
        .cart-items-list { flex: 2; background: #fff; border-radius: 12px; padding: 20px; }
        .cart-summary { flex: 1; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: fit-content; }
        
        /* Table Styles */
        .cart-table { width: 100%; border-collapse: collapse; }
        .cart-table th { text-align: left; color: #aaa; font-size: 0.8rem; text-transform: uppercase; padding-bottom: 20px; }
        .cart-item-row { border-bottom: 1px solid #eee; }
        .cart-item-row td { padding: 15px 0; }
        
        .prod-img { width: 40px; height: 40px; border-radius: 4px; vertical-align: middle; margin-right: 10px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #ff6b6b; color: white; border: none; width: 25px; height: 25px; border-radius: 4px; cursor: pointer; }
        
        .checkout-btn { background: #ff6b6b; color: white; border: none; width: 100%; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* --- Updated LIVE Logo --- */
        .live-logo-container { display: inline-flex; align-items: center; gap: 6px; }
        .live-text-bold { color: #ff0000; font-family: 'Arial Black', sans-serif; font-size: 1.2rem; line-height: 1; letter-spacing: -1px; }
        .recording-circle { position: relative; width: 20px; height: 20px; display: flex; justify-content: center; align-items: center; animation: simplePulse 1.5s infinite; }
        .inner-dot { width: 10px; height: 10px; background: #ff0000; border-radius: 50%; z-index: 2; }
        .outer-ring { position: absolute; width: 18px; height: 18px; border: 1px solid #ff0000; border-radius: 50%; }
        
        @keyframes simplePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Cart Badge Badge */
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background-color: #ff3b3b;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .market-price-label { font-weight: bold; color: #ff0000; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <a href="/index.html"><img src="/Images/logo.png" alt="Drukbasket Logo" class="main-logo"></a>
        </div>
        <nav>
            <a href="/index.html">Marketplace</a>
            <a href="/aboutUs.html">About Us</a>
            <a href="/contactUs.html">Contact Us</a>
        </nav>

        <div class="user-actions">
            <a href="/market-prices.html" style="text-decoration: none;">
                <div class="live-logo-container">
                    <span class="market-price">View Current Market Prices</span>
                    <div class="recording-circle"><div class="inner-dot"></div><div class="outer-ring"></div></div>
            </div>
            </a>
            <a href="Dzongkha/index.html" style="text-decoration: none;">EN</a>
            
            <div class="cart-container" style="position: relative; display: inline-block; cursor: pointer;">
                <span class="cart" style="font-size: 1.5rem;">🛒</span>
                <span id="cart-count" class="cart-badge">0</span>
            </div>

            <span class="notification">🔔</span>
            <a href="/login.html" class="login-btn-link">
                <button class="login-btn">LOG IN</button>
            </a>
        </div>
    </header>

    <body>
    <main class="preorder-container">
        <h1>Cart (Pre-Order list)</h1>
        <p>Pre-order needs to be placed 7 days before.</p>
        <p></p>
        <div class="cart-layout">
            <div class="cart-items-list">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>SELECT</th>
                            <th>REMOVE</th>
                            <th>PRODUCT</th>
                            <th>QUANTITY</th>
                            <th>UNIT</th>
                        </tr>
                    </thead>
                    <tbody id="cart-table-body">
                        </tbody>
                </table>
            </div>

            <aside class="cart-summary">
                <h3>Cart Summary</h3>
                <p style="color: #666; font-size: 0.8rem;">Total Cart Value</p>
                <p style="margin-top: 20px; font-weight: bold; color: #aaa; font-size: 0.7rem;">TOTAL ITEMS</p>
                <h2 id="summary-count" style="margin-top: 5px; font-size: 2rem;">0</h2>
                <button class="checkout-btn" onclick="handleCheckout()">PROCEED TO CHECKOUT</button>
                <p style="text-align: center; margin-top: 15px;"><a href="/Preorder/preorder.html" style="color: #ff6b6b; text-decoration: none; font-size: 0.8rem;">↺ BACK TO ORDER PRODUCTS</a></p>
            </aside>
        </div>
    </main>

    <script>
        // 1. DISPLAY CART ITEMS WITH SELECTIVE OPTION
        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('drukCart')) || [];
            const tableBody = document.getElementById('cart-table-body');
            const summaryCount = document.getElementById('summary-count');
            const headerBadge = document.getElementById('cart-count');
            
            if (cart.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 50px; color: #999;">Your cart is empty.</td></tr>';
                summaryCount.innerText = "0";
                headerBadge.innerText = "0";
                return;
            }

            tableBody.innerHTML = cart.map((item, index) => `
                <tr class="cart-item-row ${item.selected ? '' : 'disabled'}">
                    <td style="padding-left: 10px;">
                        <input type="checkbox" class="item-checkbox" ${item.selected ? 'checked' : ''} onchange="toggleSelect(${index})">
                    </td>
                    <td><button onclick="removeItem(${index})" style="background:none; border:none; cursor:pointer;">🗑️</button></td>
                    <td>
                        <img src="${item.img}" class="prod-img"> 
                        <span style="font-weight: 500;">${item.name}</span>
                    </td>
                    <td>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                        </div>
                    </td>
                    <td>
                        <span style="font-weight: bold; color: #555;">${item.unit}</span>
                    </td>
                </tr>
            `).join('');
            
            // Count only selected items for the summary
            const selectedItems = cart.filter(item => item.selected);
            summaryCount.innerText = selectedItems.length;
            headerBadge.innerText = cart.length;
        }

        // 2. TOGGLE SELECTION
        window.toggleSelect = function(index) {
            let cart = JSON.parse(localStorage.getItem('drukCart')) || [];
            cart[index].selected = !cart[index].selected;
            localStorage.setItem('drukCart', JSON.stringify(cart));
            displayCart();
        };

        // 3. CHECKOUT LOGIC (FILTERED)
        function handleCheckout() {
            const cart = JSON.parse(localStorage.getItem('drukCart')) || [];
            const selectedItems = cart.filter(item => item.selected);
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

            if (selectedItems.length === 0) {
                alert("Please select at least one item to checkout.");
                return;
            }

            if (!isLoggedIn) {
                localStorage.setItem('redirectAfterLogin', window.location.href);
                alert("Please login to proceed.");
                window.location.href = '/login.html';
            } else {
                // Optional: Calculate and store total for selected items only
                let total = selectedItems.reduce((sum, item) => sum + (parseFloat(item.price) * item.qty), 0);
                localStorage.setItem('tempTotalPayable', total + 75); // Nu. 75 delivery fee
                
                window.location.href = '/Checkout/checkout.html';
            }
        }

        // 4. CART ACTIONS
        window.removeItem = function(index) {
            let cart = JSON.parse(localStorage.getItem('drukCart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('drukCart', JSON.stringify(cart));
            displayCart();
        };

        window.changeQty = function(index, delta) {
            let cart = JSON.parse(localStorage.getItem('drukCart')) || [];
            cart[index].qty = Math.max(1, (cart[index].qty || 1) + delta);
            localStorage.setItem('drukCart', JSON.stringify(cart));
            displayCart();
        };

        displayCart();
        // Add this to your Checkout or Confirm Order button logic
        function completePurchase() {
            const cart = JSON.parse(localStorage.getItem('drukCart')) || [];
            const orders = JSON.parse(localStorage.getItem('pendingOrders')) || [];
            
            // Add a timestamp to each item so the dashboard filters work
            const newOrders = cart.map(item => ({
                ...item,
                timestamp: Date.now() 
            }));

            localStorage.setItem('pendingOrders', JSON.stringify([...orders, ...newOrders]));
            localStorage.removeItem('drukCart'); // Clear cart after purchase
            alert("Order placed! Analytics updated.");
        }
    </script>
</body>
</body>
</html>

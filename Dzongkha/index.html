            { name: "Mint Leaves", price: "30", unit: "Bundle", badge: "GAP", img: "https://images.unsplash.com/photo-1601648764658-cf37e8c89b70?w=300" },
            { name: "Dried Bitter Gourd", price: "300", unit: "Kg", badge: "Organic", img: "https://images.unsplash.com/photo-1449339044511-d14d2ba8294b?w=300" },

        ];

        const grid = document.getElementById('product-grid');
        const searchInput = document.getElementById('productSearch');
        const categoryFilter = document.getElementById('categoryFilter');

        // 2. COMBINED FILTER LOGIC
        function updateDisplay() {
            const searchText = searchInput.value.toLowerCase();
            const selectedCat = categoryFilter.value;

            const filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchText);
                const matchesCategory = (selectedCat === "all") || (p.badge === selectedCat);
                return matchesSearch && matchesCategory;
            });

            renderGrid(filtered);
        }

        function renderGrid(data) {
            grid.innerHTML = "";
            if (data.length === 0) {
                grid.innerHTML = `<div class="no-results">No products found matching your criteria.</div>`;
                return;
            }

            grid.innerHTML = data.map(p => {
                // Create a URL-friendly string of parameters
                const params = new URLSearchParams({
                    name: p.name,
                    price: p.price,
                    unit: p.unit,
                    img: p.img,
                    badge: p.badge || ""
                }).toString();

                return `
                    <div class="card">
                        <a href="Product/product.html?${params}" class="product-link" style="text-decoration: none;">
                            ${p.badge ? `<span class="badge ${p.badge.toLowerCase().replace(' ', '-')}">${p.badge}</span>` : ''}
                            <img src="${p.img}" alt="${p.name}">
                            <div class="card-content">
                                <h3>${p.name}</h3>
                                <p class="price">Nu. ${p.price} /${p.unit}</p>
                            </div>
                        </a>
                        <div class="card-content no-top">
                            <div class="btn-group">
                                <button class="add-cart" onclick="addToCart('${p.name}', '${p.price}', '${p.unit}', '${p.img}')">ADD TO CART</button>
                                <button class="preorder" onclick="window.location.href='/Preorder/preorder.html'">PREORDER</button>
                            </div>
                        </div> 
                    </div>
                `;
            }).join('');
        }

        // Event Listeners
        searchInput.addEventListener('input', updateDisplay);
        categoryFilter.addEventListener('change', updateDisplay);

        // CART LOGIC
        const cartBadge = document.getElementById('cart-count');
        let count = parseInt(localStorage.getItem('cartCount')) || 0;

        function updateBadge() {
            const cart = JSON.parse(localStorage.getItem('drukCart')) || [];
            const cartBadge = document.getElementById('cart-count');
            
            if (cartBadge) {
                cartBadge.innerText = cart.length;
                cartBadge.style.display = cart.length > 0 ? 'block' : 'none';
            }
        }

        function addToCart(name, price, unit, img) {
            let cartItems = JSON.parse(localStorage.getItem('drukCart')) || [];
            
            // Check if item already exists to increment quantity instead of adding new row
            const existingItem = cartItems.find(item => item.name === name);
            if (existingItem) {
                existingItem.qty++;
            } else {
                // Add selected: true by default so they are ready for checkout
                cartItems.push({ name, price, img, unit, qty: 1, selected: true });
            }
            
            localStorage.setItem('drukCart', JSON.stringify(cartItems));
            updateBadge();
        }

        // Initialize
        updateDisplay();
        updateBadge();
    </script>
    <script>
        (function() {
            // Find the product grid
            const grid = document.querySelector('.product-grid');
            
            if (grid) {
                // Convert the cards into an array
                const cards = Array.from(grid.children);

                // Shuffle the array using Fisher-Yates logic
                for (let i = cards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    grid.appendChild(cards[j]); // Appending an existing element moves it!
                }
            }
        })();
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css">
  <title>News</title>
  <style>
    :root{--bg:#f4f6f6;--card:#fff;--text:#1f2a2e;--muted:#6b7b83;--border:rgba(0,0,0,.06);--shadow:0 12px 30px rgba(16,24,40,.08);--radius:14px;
      --nav-bg:#fbf7ef;--nav-border:rgba(0,0,0,.08);--nav-active-bg:#dfeee2;--nav-active-text:#0b6b2e;}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .nav-wrap{background:var(--nav-bg);border-bottom:1px solid var(--nav-border);position:sticky;top:0;z-index:10}
    .nav{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;gap:16px}
    .nav-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .brand{font-weight:800;margin-right:8px;color:#183028}
    .nav a{text-decoration:none;color:#2a2a2a;padding:10px 18px;border-radius:12px;font-weight:600}
    .nav a:hover{background:rgba(0,0,0,.04)}
    .nav a.active{background:var(--nav-active-bg);color:var(--nav-active-text)}
    .container{max-width:1180px;margin:26px auto;padding:0 18px 30px}
    h1{margin:0 0 14px;font-size:36px}
    .sub{color:var(--muted);font-weight:600;margin-bottom:18px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    input,select{border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-weight:700;outline:none;background:#fff}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    .tag{display:inline-block;font-size:12px;font-weight:900;background:#f2f5f6;border:1px solid var(--border);padding:6px 10px;border-radius:999px}
    .title{font-weight:900;font-size:18px;margin:10px 0 6px}
    .meta{color:var(--muted);font-weight:700;font-size:13px}
    .desc{margin-top:10px;color:#2a3438;line-height:1.5}
    @media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:650px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="nav-wrap">
    <div class="nav">
      <div class="logo-container">
        <img src="/Images/logo.png" alt="Drukbasket Logo" class="main-logo">
      </div>

      <div class="nav-left">
        <a class="active" href="home.html">Home</a>
        <a href="team.html">Our Team</a>
        <a href="news.html">News</a>
        <a href="stories.html">Stories</a>
        <a href="feedback.html">Feedback</a>
        <a href="contact.html">Contact</a>
      </div>

      <div class="nav-right">
        <a href="staff.html">Staff Area</a>
      </div>
    </div>
  </div>

  <div class="container">
    <h1>News</h1>
    <div class="sub">Platform updates, announcements, and highlights.</div>

    <div class="toolbar">
      <input id="q" type="text" placeholder="Search news..." />
      <select id="category">
        <option value="all" selected>All Categories</option>
        <option value="update">Updates</option>
        <option value="market">Market</option>
        <option value="training">Training</option>
      </select>
    </div>

    <div id="newsGrid" class="grid"></div>
  </div>

  <script>
    const news = [
      { id:1, cat:"update", tag:"UPDATE", title:"Dashboard analytics is now live", date:"2026-02-12", desc:"Home now displays real-time dashboard view with KPIs, top products and transaction feed." },
      { id:2, cat:"market", tag:"MARKET", title:"New products added from farmers", date:"2026-02-10", desc:"Added seasonal vegetables and improved badge filtering for Organic / GAP / GI products." },
      { id:3, cat:"training", tag:"TRAINING", title:"Staff training schedule published", date:"2026-02-08", desc:"Training for staff area workflows: order verification, payments tracking and reporting." },
    ];

    const grid = document.getElementById("newsGrid");
    const q = document.getElementById("q");
    const category = document.getElementById("category");

    function render(){
      const query = q.value.trim().toLowerCase();
      const cat = category.value;

      const filtered = news.filter(n=>{
        const matchQ = !query || (n.title.toLowerCase().includes(query) || n.desc.toLowerCase().includes(query));
        const matchCat = cat === "all" || n.cat === cat;
        return matchQ && matchCat;
      });

      grid.innerHTML = filtered.map(n=>`
        <div class="card">
          <span class="tag">${n.tag}</span>
          <div class="title">${n.title}</div>
          <div class="meta">${n.date}</div>
          <div class="desc">${n.desc}</div>
        </div>
      `).join("") || `<div class="card">No news found.</div>`;
    }

    q.addEventListener("input", render);
    category.addEventListener("change", render);
    render();
  </script>
</body>
</html>

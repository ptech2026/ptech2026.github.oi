<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css">
  <title>Staff Area</title>
  <style>
    :root{--bg:#f4f6f6;--card:#fff;--text:#1f2a2e;--muted:#6b7b83;--border:rgba(0,0,0,.06);--shadow:0 12px 30px rgba(16,24,40,.08);--radius:14px;
      --nav-bg:#fbf7ef;--nav-border:rgba(0,0,0,.08);--nav-active-bg:#dfeee2;--nav-active-text:#0b6b2e;
      --ok:#2ecc71;--warn:#3498db;}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .nav-wrap{background:var(--nav-bg);border-bottom:1px solid var(--nav-border);position:sticky;top:0;z-index:10}
    .nav{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;gap:16px}
    .nav-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .brand{font-weight:800;margin-right:8px;color:#183028}
    .nav a{text-decoration:none;color:#2a2a2a;padding:10px 18px;border-radius:12px;font-weight:600}
    .nav a:hover{background:rgba(0,0,0,.04)}
    .container{max-width:1180px;margin:26px auto;padding:0 18px 30px}
    h1{margin:0 0 14px;font-size:36px}
    .sub{color:var(--muted);font-weight:600;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    label{font-weight:900;display:block;margin:12px 0 6px}
    input{width:100%;border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-weight:700;outline:none;background:#fff}
    .btn{margin-top:14px;border:none;border-radius:12px;padding:12px 14px;font-weight:900;cursor:pointer;color:#fff}
    .btn.ok{background:var(--ok)}
    .btn.warn{background:var(--warn)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .badge{display:inline-block;font-size:12px;font-weight:900;background:#f2f5f6;border:1px solid var(--border);padding:6px 10px;border-radius:999px;margin-right:8px}
    .menu a{display:block;text-decoration:none;color:inherit;padding:12px 10px;border-bottom:1px solid rgba(0,0,0,.06);font-weight:900}
    .menu a:last-child{border-bottom:none}
    .menu a:hover{background:rgba(0,0,0,.03);border-radius:12px}
    @media(max-width:1100px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="nav-wrap">
    <div class="nav">
      <div class="logo-container">
        <img src="/Images/logo.png" alt="Drukbasket Logo" class="main-logo">
      </div>

      <div class="nav-left">
        <a class="active" href="home.html">Home</a>
        <a href="team.html">Our Team</a>
        <a href="news.html">News</a>
        <a href="stories.html">Stories</a>
        <a href="feedback.html">Feedback</a>
        <a href="contact.html">Contact</a>
      </div>

      <div class="nav-right">
        <a href="staff.html">Staff Area</a>
      </div>
    </div>
  </div>

  <div class="container">
    <h1>Staff Area</h1>
    <div class="sub">Login and manage products, orders, farmers, and reports. (Front-end demo)</div>

    <div class="grid">
      <div class="card">
        <div style="font-weight:900;font-size:18px;margin-bottom:8px;">Staff Login</div>
        <div class="row">
          <span class="badge">Demo</span>
          <span class="badge">Local only</span>
        </div>

        <form id="loginForm">
          <label>Username</label>
          <input id="u" required placeholder="staff" value="staff" />
          <label>Password</label>
          <input id="p" required type="password" placeholder="password" value="password" />
          <button class="btn ok" type="submit">Login</button>
        </form>

        <div id="loginMsg" style="margin-top:10px;color:var(--muted);font-weight:800"></div>
      </div>

      <div class="card">
        <div style="font-weight:900;font-size:18px;margin-bottom:8px;">Staff Menu</div>
        <div class="menu">
          <a href="#" onclick="alert('Next: build Products CRUD page')">Products Management</a>
          <a href="#" onclick="alert('Next: build Orders page')">Orders & Transactions</a>
          <a href="#" onclick="alert('Next: build Farmers page + certificates/map')">Farmers & Certificates</a>
          <a href="#" onclick="alert('Next: build Reports export')">Reports & Export</a>
        </div>
        <button class="btn warn" style="margin-top:14px" onclick="alert('Later we connect NDI/OTP login here')">
          Configure Authentication
        </button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("loginMsg");

    form.addEventListener("submit",(e)=>{
      e.preventDefault();
      const u = document.getElementById("u").value.trim();
      const p = document.getElementById("p").value.trim();

      if(u === "staff" && p === "password"){
        msg.textContent = "Login successful (demo). Next: redirect to staff dashboard / CRUD pages.";
      } else {
        msg.textContent = "Invalid credentials (demo). Try staff / password.";
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Druk Basket</title>
    <script src="/auth.js"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Header Logo Styling */
        .live-logo-container { display: inline-flex; align-items: center; gap: 4px; }
        .recording-circle { position: relative; width: 20px; height: 20px; animation: simplePulse 1.5s infinite; }
        .inner-dot { width: 12px; height: 12px; background: #ff0000; border-radius: 50%; position: absolute; top: 4px; left: 4px; }
        .outer-ring { width: 20px; height: 20px; border: 1px solid #ff0000; border-radius: 50%; }
        @keyframes simplePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        .contact-form {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .submit-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .submit-btn:hover { background: #27ae60; }
        @media (max-width: 768px) {
            .contact-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <img src="Images/logo.png" alt="Drukbasket Logo" class="main-logo">
        </div>
        <nav>
            <a href="/index.html">Marketplace</a>
            <a href="/aboutUs.html">About Us</a>
            <a href="/contactUs.html">Contact Us</a>
        </nav>

        <div class="user-actions">
            <a href="/market-prices.html" style="text-decoration: none;">
                <div class="live-logo-container">
                    <span class="market-price">View Current Market Prices</span>
                    <div class="recording-circle"><div class="inner-dot"></div><div class="outer-ring"></div></div>
                </div>
            </a>
            <a href="Dzongkha/index.html" style="text-decoration: none;">EN</a>
            
            <div class="cart-container" style="position: relative; display: inline-block; cursor: pointer;" onclick="window.location.href='/Addtocart/addToCart.html'">
                <span class="cart" style="font-size: 1.5rem;">🛒</span>
                <span id="cart-count" class="cart-badge">0</span>
            </div>

            <span class="notification">🔔</span>
            <a href="/login.html" class="login-btn-link">
                <button class="login-btn">LOG IN</button>
            </a>
        </div>
    </header>

    <main class="contact-container">
        <div>
            <h2>Get In Touch</h2>
            <p>Have questions about our organic products or want to become a supplier? Reach out to us!</p>
            <div style="margin-top: 30px;">
                <p><strong>📍 Location:</strong> Thimphu, Bhutan</p>
                <p><strong>📞 Phone:</strong> +975 17XXXXXX</p>
                <p><strong>✉️ Email:</strong> support@drukbasket.bt</p>
                <p><strong></strong><b>Troll Free</b></strong> 9001</p>
            </div>
        </div>

        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message Sent!');">
            <h3>Send us a Message</h3>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="How can we help you?" rows="5" required></textarea>
            <button type="submit" class="submit-btn">SEND MESSAGE</button>
        </form>
    </main>
</body>
</html>
